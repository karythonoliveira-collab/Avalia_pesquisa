<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliador — Lógica de Programação</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg: #0d0f14;
            --surface: #141720;
            --surface2: #1c2030;
            --border: #2a2f42;
            --accent: #5b6aff;
            --accent2: #ff5b8a;
            --accent3: #5bffb8;
            --warn: #f5a623;
            --text: #e8eaf2;
            --muted: #7880a0;
            --ok: #3dd68c;
            --bad: #ff4f6a;
            --radius: 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── TOP BAR ── */
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 200;
        }

        .topbar-title {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: .06em;
            color: var(--accent);
            font-family: 'Space Mono', monospace;
        }

        .topbar-title span {
            color: var(--text);
        }

        .topbar-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* ── TABS ── */
        .tabs-wrapper {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            overflow-x: auto;
            position: sticky;
            top: 58px;
            z-index: 100;
        }

        .tabs-wrapper::-webkit-scrollbar {
            height: 3px;
        }

        .tabs-wrapper::-webkit-scrollbar-thumb {
            background: var(--border);
        }

        .tabs {
            display: flex;
            white-space: nowrap;
        }

        .tab {
            padding: 13px 16px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .05em;
            color: var(--muted);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all .18s;
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
            user-select: none;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .tab:hover {
            color: var(--text);
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-name {
            line-height: 1;
        }

        .tab-badges {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .tab-pill {
            padding: 1px 6px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 700;
            background: var(--surface2);
            color: var(--muted);
            line-height: 1.6;
            white-space: nowrap;
        }

        .tab.active .tab-pill {
            background: var(--accent);
            color: #fff;
        }

        .tab-pill.pill-team {
            background: rgba(245, 166, 35, .18);
            color: var(--warn);
        }

        .tab.active .tab-pill.pill-team {
            background: var(--warn);
            color: #000;
        }

        .tab-pill.pill-saved {
            background: rgba(61, 214, 140, .18);
            color: var(--ok);
        }

        /* ── CONTENT ── */
        .content {
            max-width: 980px;
            margin: 0 auto;
            padding: 28px 22px 60px;
        }

        /* ── GROUP NAME BAR ── */
        .group-name-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .group-name-bar label {
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--muted);
            flex-shrink: 0;
        }

        .group-input {
            flex: 1;
            min-width: 180px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 7px;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            outline: none;
            transition: border-color .2s;
        }

        .group-input:focus {
            border-color: var(--accent);
        }

        .group-input::placeholder {
            color: var(--muted);
            font-weight: 400;
        }

        /* ── BUTTONS ── */
        .btn {
            padding: 8px 18px;
            border-radius: 7px;
            border: none;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all .15s;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: #6f7dff;
            transform: translateY(-1px);
        }

        .btn-danger {
            background: transparent;
            color: var(--accent2);
            border: 1px solid var(--accent2);
        }

        .btn-danger:hover {
            background: var(--accent2);
            color: #fff;
        }

        .btn-export {
            background: var(--accent3);
            color: #0d0f14;
        }

        .btn-export:hover {
            background: #6fffc8;
            transform: translateY(-1px);
        }

        .btn-sm {
            padding: 5px 12px;
            font-size: 12px;
        }

        /* ── PANEL HEADER ── */
        .panel-header {
            margin-bottom: 22px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .panel-header-left {}

        .panel-tag {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: .14em;
            margin-bottom: 5px;
        }

        .panel-title {
            font-size: 24px;
            font-weight: 800;
            line-height: 1.15;
        }

        .panel-sub {
            color: var(--muted);
            font-size: 13px;
            margin-top: 5px;
        }

        /* ── SCORE STRIP ── */
        .score-strip {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 22px;
        }

        .score-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 18px;
            transition: border-color .2s;
        }

        .score-card.highlight {
            border-color: var(--accent);
            background: rgba(91, 106, 255, .07);
        }

        .sc-label {
            font-size: 10px;
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .sc-val {
            font-size: 28px;
            font-weight: 800;
            font-family: 'Space Mono', monospace;
            line-height: 1;
        }

        .sc-max {
            font-size: 12px;
            color: var(--muted);
            margin-left: 2px;
        }

        .sc-bar-wrap {
            background: var(--surface2);
            border-radius: 4px;
            height: 5px;
            overflow: hidden;
            margin-top: 10px;
        }

        .sc-bar {
            height: 100%;
            border-radius: 4px;
            transition: width .4s cubic-bezier(.4, 0, .2, 1);
        }

        .sc-bar.bar-content {
            background: linear-gradient(90deg, var(--accent), #8b94ff);
        }

        .sc-bar.bar-team {
            background: linear-gradient(90deg, var(--warn), #ffd166);
        }

        .sc-bar.bar-final {
            background: linear-gradient(90deg, var(--accent3), #88ffda);
        }

        /* ── SECTION ── */
        .section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 22px;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--muted);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 3px;
            height: 13px;
            border-radius: 2px;
        }

        .section.content-section .section-title::before {
            background: var(--accent);
        }

        .section.team-section .section-title::before {
            background: var(--warn);
        }

        .section.notes-section .section-title::before {
            background: var(--muted);
        }

        /* ── CHECKLIST ── */
        .checklist {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .check-item {
            display: flex;
            align-items: flex-start;
            gap: 11px;
            padding: 11px 13px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface2);
            cursor: pointer;
            transition: border-color .15s, background .15s;
            user-select: none;
        }

        .check-item:hover {
            border-color: var(--accent);
        }

        .check-item.checked {
            border-color: var(--ok);
            background: rgba(61, 214, 140, .05);
        }

        .check-item.team-item:hover {
            border-color: var(--warn);
        }

        .check-item.team-item.checked {
            border-color: var(--warn);
            background: rgba(245, 166, 35, .05);
        }

        .check-box {
            width: 20px;
            height: 20px;
            border-radius: 5px;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
            font-size: 11px;
            transition: all .12s;
        }

        .check-item.checked .check-box {
            background: var(--ok);
            border-color: var(--ok);
            color: #fff;
        }

        .check-item.team-item.checked .check-box {
            background: var(--warn);
            border-color: var(--warn);
            color: #000;
        }

        .check-label {
            flex: 1;
            font-size: 13px;
            line-height: 1.4;
        }

        .check-label strong {
            display: block;
            font-weight: 700;
            margin-bottom: 1px;
        }

        .check-label span {
            font-size: 11px;
            color: var(--muted);
        }

        .check-pts {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            flex-shrink: 0;
            margin-top: 3px;
        }

        .check-item.checked .check-pts {
            color: var(--ok);
        }

        .check-item.team-item.checked .check-pts {
            color: var(--warn);
        }

        /* ── NOTES ── */
        .notes-area {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            padding: 10px 13px;
            resize: vertical;
            min-height: 72px;
            outline: none;
            transition: border-color .2s;
            display: block;
        }

        .notes-area:focus {
            border-color: var(--accent);
        }

        /* ── DIVIDER ── */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0 16px;
            color: var(--muted);
            font-size: 10px;
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
            letter-spacing: .1em;
        }

        .section-divider::before,
        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── BADGE ── */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 700;
            font-family: 'Space Mono', monospace;
        }

        .badge-green {
            background: rgba(61, 214, 140, .15);
            color: var(--ok);
        }

        .badge-yellow {
            background: rgba(245, 166, 35, .15);
            color: var(--warn);
        }

        .badge-red {
            background: rgba(255, 79, 106, .15);
            color: var(--bad);
        }

        .badge-blue {
            background: rgba(91, 106, 255, .15);
            color: var(--accent);
        }

        /* ── RESUMO TABLE ── */
        .resumo-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .resumo-table-wrap {
            overflow-x: auto;
        }

        .resumo-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .resumo-table th {
            background: var(--surface2);
            padding: 10px 14px;
            text-align: left;
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        .resumo-table td {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(42, 47, 66, .5);
            white-space: nowrap;
        }

        .resumo-table tr:last-child td {
            border-bottom: none;
        }

        .resumo-table tr:hover td {
            background: rgba(28, 32, 48, .6);
        }

        .resumo-table td.col-name {
            font-weight: 700;
            min-width: 160px;
        }

        .resumo-table td.col-final {
            font-weight: 800;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.7;
        }

        .empty-icon {
            font-size: 38px;
            margin-bottom: 10px;
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 22px;
            right: 22px;
            background: var(--surface);
            border: 1px solid var(--accent3);
            color: var(--accent3);
            padding: 11px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            z-index: 9999;
            opacity: 0;
            transform: translateY(8px);
            transition: all .25s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── DELETE BTN ── */
        .del-btn {
            background: transparent;
            border: none;
            color: var(--bad);
            cursor: pointer;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 4px;
            opacity: .6;
            transition: opacity .15s;
        }

        .del-btn:hover {
            opacity: 1;
            background: rgba(255, 79, 106, .1);
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>
</head>

    <!-- TABS -->
    <div class="tabs-wrapper">
        <div class="tabs" id="tabs"></div>
    </div>

    <!-- CONTENT -->
    <div class="content" id="content"></div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

                id: 'tema6', tag: 'Grupo 6', title: 'Estruturas de Repetição', sub: 'Laços de Repetição',
                criteria: [
                    { id: 'c1', label: 'FOR — conceito e uso', desc: 'Laço determinístico com range/lista', pts: 0.9 },
                    { id: 'c2', label: 'WHILE — conceito e uso', desc: 'Laço com condição de parada', pts: 0.9 },
                    { id: 'c3', label: 'Repetições controladas (break/continue)', desc: 'Explica break e continue com exemplos', pts: 0.8 },
                    { id: 'c4', label: 'Loops infinitos', desc: 'O que são, riscos e como evitar', pts: 0.8 },
                    { id: 'c5', label: 'Exemplo em pseudocódigo', desc: 'Uso de for e while no pseudocódigo', pts: 1.1 },
                    { id: 'c6', label: 'Exemplo em Python', desc: 'Código Python com for e while', pts: 1.5 },
                    { id: 'c7', label: 'Conclusão do grupo', desc: 'Reflexão sobre laços de repetição', pts: 0.5 },
                    { id: 'c8', label: 'Referências bibliográficas', desc: 'Fontes confiáveis', pts: 0.5 },
                ]
            },
            {
                id: 'tema7', tag: 'Grupo 7', title: 'Listas', sub: 'Armazenamento de Múltiplos Valores',
                criteria: [
                    { id: 'c1', label: 'O que são listas', desc: 'Conceito, criação e acesso por índice', pts: 0.9 },
                    { id: 'c2', label: 'Inserção e remoção de dados', desc: 'append, remove, pop, insert com exemplos', pts: 0.9 },
                    { id: 'c3', label: 'Percorrer listas', desc: 'for em lista, índice, enumerate', pts: 1.0 },
                    { id: 'c4', label: 'Ordenação simples', desc: 'sort, sorted, reverse com exemplos', pts: 0.8 },
                    { id: 'c5', label: 'Exemplo em pseudocódigo', desc: 'Manipulação de lista no pseudocódigo', pts: 1.0 },
                    { id: 'c6', label: 'Exemplo em Python', desc: 'Código Python com listas e suas operações', pts: 1.5 },
                    { id: 'c7', label: 'Conclusão do grupo', desc: 'Reflexão e síntese do tema', pts: 0.5 },
                    { id: 'c8', label: 'Referências bibliográficas', desc: 'Fontes confiáveis', pts: 0.4 },
                ]
            },
            {
                id: 'tema8', tag: 'Grupo 8', title: 'Funções e Boas Práticas', sub: 'Organização e Reutilização de Código',
                criteria: [
                    { id: 'c1', label: 'O que são funções (def)', desc: 'Conceito de def e chamada de função', pts: 0.7 },
                    { id: 'c2', label: 'Parâmetros e argumentos', desc: 'Parâmetros, argumentos e valores padrão', pts: 0.7 },
                    { id: 'c3', label: 'Retorno (return)', desc: 'return e uso do valor retornado', pts: 0.7 },
                    { id: 'c4', label: 'Modularização', desc: 'Divisão em funções para reutilização', pts: 0.7 },
                    { id: 'c5', label: 'Comentários e docstrings', desc: '# e """ comentários explicando o código', pts: 0.6 },
                    { id: 'c6', label: 'Identação', desc: 'Regras e importância do recuo no Python', pts: 0.6 },
                    { id: 'c7', label: 'Exemplo em pseudocódigo', desc: 'Função bem definida no pseudocódigo', pts: 1.0 },
                    { id: 'c8', label: 'Exemplo em Python', desc: 'Funções completas com parâmetros e retorno', pts: 1.5 },
                    { id: 'c9', label: 'Conclusão do grupo', desc: 'Reflexão sobre boas práticas', pts: 0.5 },
                    { id: 'c10', label: 'Referências bibliográficas', desc: 'Fontes confiáveis', pts: 0.3 },
                ]
            }
        ];

        // Critérios de equipe (embutidos em cada aba de tema)
        const TEAM_CRITERIA = [
            { id: 't1', label: 'Participação de todos os integrantes', desc: 'Todos falaram durante a apresentação', pts: 2.0 },
            { id: 't2', label: 'Tempo de apresentação (10–15 min)', desc: 'Dentro do tempo estipulado', pts: 1.5 },
            { id: 't3', label: 'Clareza e objetividade', desc: 'Explicações claras e bem estruturadas', pts: 1.5 },
            { id: 't4', label: 'Demonstração prática dos exemplos', desc: 'Rodou o código ao vivo ou mostrou resultado', pts: 2.0 },
            { id: 't5', label: 'Domínio do conteúdo', desc: 'Respondeu perguntas com segurança', pts: 2.0 },
            { id: 't6', label: 'Organização do material', desc: 'Apresentação visual organizada (slides, quadro etc)', pts: 1.0 },
        ];

        // ══════════════════════════════════════════════════════
        //  STATE
        // ══════════════════════════════════════════════════════

        // Storage: { tema_id: { groupName, content: {checks, notes}, team: {checks, notes} } }
        let saved = JSON.parse(localStorage.getItem('lp_v2') || '{}');
        let activeTab = 'tema1';

        // Working state per theme (unsaved)
        let working = {};
        THEMES.forEach(t => {
            working[t.id] = {
                groupName: saved[t.id]?.groupName || '',
                content: { checks: {}, notes: '' },
                team: { checks: {}, notes: '' }
            };
            t.criteria.forEach(c => {
                working[t.id].content.checks[c.id] = saved[t.id]?.content?.checks?.[c.id] || false;
            });
            TEAM_CRITERIA.forEach(c => {
                working[t.id].team.checks[c.id] = saved[t.id]?.team?.checks?.[c.id] || false;
            });
            working[t.id].content.notes = saved[t.id]?.content?.notes || '';
            working[t.id].team.notes = saved[t.id]?.team?.notes || '';
        });

        // ══════════════════════════════════════════════════════
        //  SCORING
        // ══════════════════════════════════════════════════════

        function calcContent(themeId) {
            const theme = THEMES.find(t => t.id === themeId);
            const checks = working[themeId].content.checks;
            let s = 0;
            theme.criteria.forEach(c => { if (checks[c.id]) s += c.pts; });
            return +Math.min(s, 10).toFixed(2);
        }

        function calcTeam(themeId) {
            const checks = working[themeId].team.checks;
            let s = 0;
            TEAM_CRITERIA.forEach(c => { if (checks[c.id]) s += c.pts; });
            return +Math.min(s, 10).toFixed(2);
        }

        function calcFinal(themeId) {
            return +(calcContent(themeId) * 0.7 + calcTeam(themeId) * 0.3).toFixed(2);
        }

        function isSaved(themeId) { return !!saved[themeId]; }

        function getGrade(score) {
            if (score >= 9) return { label: 'Excelente', cls: 'badge-green' };
            if (score >= 7) return { label: 'Bom', cls: 'badge-green' };
            if (score >= 5) return { label: 'Regular', cls: 'badge-yellow' };
            return { label: 'Insuf.', cls: 'badge-red' };
        }

        // ══════════════════════════════════════════════════════
        //  RENDER
        // ══════════════════════════════════════════════════════

        function renderTabs() {
            const el = document.getElementById('tabs');
            const allTabs = [...THEMES.map(t => t.id), 'resumo'];
            el.innerHTML = allTabs.map(id => {
                if (id === 'resumo') {
                    const cnt = Object.keys(saved).length;
                    return `<div class="tab${id === activeTab ? ' active' : ''}" onclick="switchTab('${id}')">
        <div class="tab-name">Resumo</div>
        <div class="tab-badges"><span class="tab-pill">${cnt} grupo${cnt !== 1 ? 's' : ''}</span></div>
      </div>`;
                }
                const t = THEMES.find(x => x.id === id);
                const fin = calcFinal(id);
                const sv = isSaved(id);
                return `<div class="tab${id === activeTab ? ' active' : ''}" onclick="switchTab('${id}')">
      <div class="tab-name">${t.tag}</div>
      <div class="tab-badges">
        <span class="tab-pill">${fin.toFixed(1)}</span>
        ${sv ? '<span class="tab-pill pill-saved">✓</span>' : ''}
      </div>
    </div>`;
            }).join('');
        }

        function renderContent() {
            const el = document.getElementById('content');
            if (activeTab === 'resumo') { el.innerHTML = renderResumo(); }
            else { el.innerHTML = renderTheme(THEMES.find(t => t.id === activeTab)); }
            attachEvents();
        }

        function renderTheme(theme) {
            const tid = theme.id;
            const cs = calcContent(tid);
            const ts = calcTeam(tid);
            const fin = calcFinal(tid);
            const grade = getGrade(fin);
            const cc = working[tid].content.checks;
            const tc = working[tid].team.checks;
            const gName = working[tid].groupName;
            const sv = isSaved(tid);

            return `
  <div class="group-name-bar">
    <label>Nome do Grupo:</label>
    <input class="group-input" id="gname_${tid}" data-tid="${tid}" type="text"
      placeholder="Ex: Grupo ${theme.tag.replace('Grupo ', '')} — Nomes dos alunos…"
      value="${escHtml(gName)}" oninput="onGroupName(this)" />
    <button class="btn btn-primary btn-sm" onclick="saveGroup('${tid}')">✓ Salvar</button>
    <button class="btn btn-danger btn-sm" onclick="clearGroup('${tid}')">✕ Limpar</button>
    ${sv ? `<span class="badge badge-green">Salvo</span>` : ''}
  </div>

  <div class="panel-header">
    <div class="panel-header-left">
      <div class="panel-tag">${theme.tag}</div>
      <div class="panel-title">${theme.title}</div>
      <div class="panel-sub">${theme.sub}</div>
    </div>
    <span class="badge ${grade.cls}" style="font-size:13px;padding:6px 14px">${grade.label}</span>
  </div>

  <div class="score-strip">
    <div class="score-card">
      <div class="sc-label">📝 Conteúdo</div>
      <div><span class="sc-val">${cs.toFixed(1)}</span><span class="sc-max">/10</span></div>
      <div class="sc-bar-wrap"><div class="sc-bar bar-content" style="width:${cs * 10}%"></div></div>
    </div>
    <div class="score-card">
      <div class="sc-label">👥 Equipe</div>
      <div><span class="sc-val">${ts.toFixed(1)}</span><span class="sc-max">/10</span></div>
      <div class="sc-bar-wrap"><div class="sc-bar bar-team" style="width:${ts * 10}%"></div></div>
    </div>
    <div class="score-card highlight">
      <div class="sc-label">🏆 Nota Final <small style="color:var(--muted)">(70%+30%)</small></div>
      <div><span class="sc-val" style="color:var(--accent3)">${fin.toFixed(2)}</span><span class="sc-max">/10</span></div>
      <div class="sc-bar-wrap"><div class="sc-bar bar-final" style="width:${fin * 10}%"></div></div>
    </div>
  </div>

  <!-- CONTENT CHECKLIST -->
  <div class="section content-section">
    <div class="section-title">Requisitos do Conteúdo</div>
    <div class="checklist">
      ${theme.criteria.map(c => `
        <div class="check-item${cc[c.id] ? ' checked' : ''}" data-tid="${tid}" data-type="content" data-cid="${c.id}">
          <div class="check-box">${cc[c.id] ? '✓' : ''}</div>
          <div class="check-label">
            <strong>${c.label}</strong>
            <span>${c.desc}</span>
          </div>
          <div class="check-pts">${c.pts.toFixed(1)}pt</div>
        </div>`).join('')}
    </div>
    <textarea class="notes-area" data-tid="${tid}" data-type="content"
      placeholder="Observações sobre o conteúdo apresentado…" style="margin-top:14px">${escHtml(working[tid].content.notes)}</textarea>
  </div>

  <div class="section-divider">Avaliação de Equipe</div>

  <!-- TEAM CHECKLIST -->
  <div class="section team-section">
    <div class="section-title">Trabalho em Equipe & Apresentação</div>
    <div class="checklist">
      ${TEAM_CRITERIA.map(c => `
        <div class="check-item team-item${tc[c.id] ? ' checked' : ''}" data-tid="${tid}" data-type="team" data-cid="${c.id}">
          <div class="check-box">${tc[c.id] ? '✓' : ''}</div>
          <div class="check-label">
            <strong>${c.label}</strong>
            <span>${c.desc}</span>
          </div>
          <div class="check-pts">${c.pts.toFixed(1)}pt</div>
        </div>`).join('')}
    </div>
    <textarea class="notes-area" data-tid="${tid}" data-type="team"
      placeholder="Observações sobre a apresentação e trabalho em equipe…" style="margin-top:14px">${escHtml(working[tid].team.notes)}</textarea>
  </div>`;
        }

        function renderResumo() {
            const keys = Object.keys(saved);

            return `
  <div class="panel-header">
    <div class="panel-header-left">
      <div class="panel-tag">Painel Geral</div>
      <div class="panel-title">Resumo de Todas as Avaliações</div>
      <div class="panel-sub">Visão consolidada — ${keys.length} grupo${keys.length !== 1 ? 's' : ''} avaliado${keys.length !== 1 ? 's' : ''}</div>
    </div>
  </div>

  ${keys.length === 0 ? `
    <div class="resumo-section">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        Nenhum grupo salvo ainda.<br>
        Abra cada aba, avalie e clique em <strong>✓ Salvar</strong>.
      </div>
    </div>
  ` : `
    <div class="resumo-section">
      <div class="resumo-table-wrap">
        <table class="resumo-table">
          <thead>
            <tr>
              <th>Tema / Grupo</th>
              <th>Alunos</th>
              <th>Conteúdo</th>
              <th>Equipe</th>
              <th>Nota Final</th>
              <th>Conceito</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${THEMES.map(t => {
                if (!saved[t.id]) return '';
                const s = saved[t.id];
                // recalc from saved
                let cs = 0;
                t.criteria.forEach(c => { if (s.content?.checks?.[c.id]) cs += c.pts; });
                cs = +Math.min(cs, 10).toFixed(2);
                let ts = 0;
                TEAM_CRITERIA.forEach(c => { if (s.team?.checks?.[c.id]) ts += c.pts; });
                ts = +Math.min(ts, 10).toFixed(2);
                const fin = +(cs * 0.7 + ts * 0.3).toFixed(2);
                const grade = getGrade(fin);
                const gName = s.groupName || '—';
                return `<tr>
                <td class="col-name"><span class="badge badge-blue">${t.tag}</span><br><small style="color:var(--muted)">${t.title}</small></td>
                <td>${escHtml(gName)}</td>
                <td>${cs.toFixed(1)}</td>
                <td>${ts.toFixed(1)}</td>
                <td class="col-final">${fin.toFixed(2)}</td>
                <td><span class="badge ${grade.cls}">${grade.label}</span></td>
                <td><button class="del-btn" onclick="deleteSaved('${t.id}')">🗑</button></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `}`;
        }

        // ══════════════════════════════════════════════════════
        //  EVENTS
        // ══════════════════════════════════════════════════════

        function attachEvents() {
            // Checkboxes
            document.querySelectorAll('.check-item[data-tid]').forEach(el => {
                el.addEventListener('click', () => {
                    const { tid, type, cid } = el.dataset;
                    working[tid][type].checks[cid] = !working[tid][type].checks[cid];
                    renderTabs();
                    renderContent();
                });
            });

            // Textareas
            document.querySelectorAll('.notes-area[data-tid]').forEach(el => {
                el.addEventListener('input', () => {
                    working[el.dataset.tid][el.dataset.type].notes = el.value;
                });
            });
        }

        function onGroupName(el) {
            working[el.dataset.tid].groupName = el.value;
        }

        function switchTab(id) {
            activeTab = id;
            renderTabs();
            renderContent();
        }

        function saveGroup(tid) {
            saved[tid] = JSON.parse(JSON.stringify(working[tid]));
            localStorage.setItem('lp_v2', JSON.stringify(saved));
            renderTabs();
            renderContent();
            showToast(`✓ ${THEMES.find(t => t.id === tid).tag} salvo!`);
        }

        function clearGroup(tid) {
            const theme = THEMES.find(t => t.id === tid);
            working[tid] = { groupName: '', content: { checks: {}, notes: '' }, team: { checks: {}, notes: '' } };
            theme.criteria.forEach(c => { working[tid].content.checks[c.id] = false; });
            TEAM_CRITERIA.forEach(c => { working[tid].team.checks[c.id] = false; });
            renderTabs();
            renderContent();
            showToast('Avaliação limpa (não salva).');
        }

        function deleteSaved(tid) {
            delete saved[tid];
            localStorage.setItem('lp_v2', JSON.stringify(saved));
            renderTabs();
            renderContent();
            showToast('Avaliação removida.');
        }

        // ══════════════════════════════════════════════════════
        //  EXPORT EXCEL
        // ══════════════════════════════════════════════════════

        function exportExcel() {
            const keys = Object.keys(saved);
            if (keys.length === 0) { showToast('Nenhum grupo salvo para exportar!'); return; }

            const wb = XLSX.utils.book_new();

            // ── Resumo Geral ──
            const header = ['Tema', 'Grupo / Alunos', 'Nota Conteúdo', 'Nota Equipe', 'Nota Final', 'Conceito'];
            const rows = [['AVALIAÇÃO — LÓGICA DE PROGRAMAÇÃO'], [], header];

            THEMES.forEach(t => {
                if (!saved[t.id]) return;
                const s = saved[t.id];
                let cs = 0;
                t.criteria.forEach(c => { if (s.content?.checks?.[c.id]) cs += c.pts; });
                cs = +Math.min(cs, 10).toFixed(2);
                let ts = 0;
                TEAM_CRITERIA.forEach(c => { if (s.team?.checks?.[c.id]) ts += c.pts; });
                ts = +Math.min(ts, 10).toFixed(2);
                const fin = +(cs * 0.7 + ts * 0.3).toFixed(2);
                rows.push([`${t.tag} — ${t.title}`, s.groupName || '', cs, ts, fin, getGrade(fin).label]);
            });

            const ws = XLSX.utils.aoa_to_sheet(rows);
            ws['!cols'] = [{ wch: 30 }, { wch: 36 }, { wch: 16 }, { wch: 14 }, { wch: 14 }, { wch: 14 }];
            XLSX.utils.book_append_sheet(wb, ws, 'Resumo Geral');

            // ── Sheet per group ──
            THEMES.forEach(t => {
                if (!saved[t.id]) return;
                const s = saved[t.id];
                const sheetRows = [
                    [`${t.tag} — ${t.title}`],
                    [`Alunos: ${s.groupName || ''}`],
                    [],
                    ['CONTEÚDO', 'Critério', 'Pts Possíveis', 'Pts Obtidos']
                ];
                t.criteria.forEach(c => {
                    sheetRows.push(['', c.label, c.pts, s.content?.checks?.[c.id] ? c.pts : 0]);
                });
                let cs = 0;
                t.criteria.forEach(c => { if (s.content?.checks?.[c.id]) cs += c.pts; });
                sheetRows.push(['', 'TOTAL CONTEÚDO', 10, +Math.min(cs, 10).toFixed(2)]);
                if (s.content?.notes) sheetRows.push(['Obs. Conteúdo:', s.content.notes]);
                sheetRows.push([]);

                sheetRows.push(['EQUIPE', 'Critério', 'Pts Possíveis', 'Pts Obtidos']);
                TEAM_CRITERIA.forEach(c => {
                    sheetRows.push(['', c.label, c.pts, s.team?.checks?.[c.id] ? c.pts : 0]);
                });
                let ts = 0;
                TEAM_CRITERIA.forEach(c => { if (s.team?.checks?.[c.id]) ts += c.pts; });
                sheetRows.push(['', 'TOTAL EQUIPE', 10, +Math.min(ts, 10).toFixed(2)]);
                if (s.team?.notes) sheetRows.push(['Obs. Equipe:', s.team.notes]);
                sheetRows.push([]);

                const fin = +(Math.min(cs, 10) * 0.7 + Math.min(ts, 10) * 0.3).toFixed(2);
                sheetRows.push(['NOTA FINAL', '(70% conteúdo + 30% equipe)', '', fin]);
                sheetRows.push(['Conceito', getGrade(fin).label]);

                const wsG = XLSX.utils.aoa_to_sheet(sheetRows);
                wsG['!cols'] = [{ wch: 18 }, { wch: 40 }, { wch: 16 }, { wch: 14 }];
                const sName = `${t.tag}`.substring(0, 31).replace(/[\\/:*?\[\]]/g, '_');
                XLSX.utils.book_append_sheet(wb, wsG, sName);
            });

            XLSX.writeFile(wb, 'avaliacao_logica_programacao.xlsx');
            showToast('✓ Excel exportado!');
        }

        // ══════════════════════════════════════════════════════
        //  UTILS
        // ══════════════════════════════════════════════════════

        function escHtml(s) {
            return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        let toastTimer;
        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
        }

        // ── INIT ──
        renderTabs();
        renderContent();
    </script>
</body>

</html>
